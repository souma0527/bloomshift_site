<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:sans-serif;
}

/* セクション */
.section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* 画像 */
img{
max-width:100%;
max-height:100vh;
object-fit:contain;
}

/* 動画 */
video{
max-width:100%;
max-height:100vh;
}

/* PCの場合少し余白 */
@media (min-width:900px){

.section{
padding:40px;
}

img,video{
max-width:80%;
}

}

</style>
</head>

<body>

<div class="section">
<img src="PureboG.png">
</div>

<div class="section">
<video controls autoplay muted playsinline>
<source src="a.mp4" type="video/mp4">
</video>
</div>

</body>
</html>
